
<!DOCTYPE html>
<html>
<head>
    <title>Semantic and Non-Semantic Elements</title>
</head>
<body>

    <header>
        <h1>Welcome to My Web Page</h1>
        <p>This is created using semantic and non-semantic tags.</p>
    </header>

    <div style="border:1px solid black; padding:10px;">
        <h2>About Me</h2>
        <p>
            My name is <span style="color:blue;">Abhiraj</span> and I am learning HTML.
        </p>
    </div>

    <article>
        <h2>My First Article</h2>
        <p>This is an example of using <b>semantic</b> and <b>non-semantic</b> tags in HTML.</p>
    </article>

</body>
</html>
